<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;
  -webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.swatch{border-radius:var(--r-sm);border:1px solid var(--line-2)}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}

</style></head><body><div class="row" style="gap:16px">
<div class="col" style="gap:6px"><div style="width:84px;height:64px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:6px"></div><div class="lbl">r-xs · 6px</div></div><div class="col" style="gap:6px"><div style="width:84px;height:64px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:10px"></div><div class="lbl">r-sm · 10px</div></div><div class="col" style="gap:6px"><div style="width:84px;height:64px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:14px"></div><div class="lbl">r-md · 14px</div></div><div class="col" style="gap:6px"><div style="width:84px;height:64px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:20px"></div><div class="lbl">r-lg · 20px</div></div><div class="col" style="gap:6px"><div style="width:84px;height:64px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:28px"></div><div class="lbl">r-xl · 28px</div></div>
</div></body></html>
