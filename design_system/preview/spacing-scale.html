<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;
  -webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.swatch{border-radius:var(--r-sm);border:1px solid var(--line-2)}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
.bar{height:14px;background:var(--accent);border-radius:3px}
</style></head><body><div class="col" style="gap:9px">
<div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div><div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div><div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div><div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div><div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-5</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div><div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-6</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div><div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-7</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div><div class="row" style="gap:12px"><span class="lbl" style="width:54px">sp-8</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
</div></body></html>
