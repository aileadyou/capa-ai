<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:6px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
.swatch{border-radius:10px;border:1px solid var(--line-2)}

</style></head><body>
<div class="row" style="gap:20px;align-items:flex-start">
  <div class="col">
    <div class="swatch" style="width:180px;height:64px;background:var(--grad-brand)"></div>
    <div class="lbl">grad-brand</div>
    <div class="val">#9B3AC5 → #C4688C → #E07D60</div>
  </div>
  <div class="col">
    <div class="swatch" style="width:100px;height:64px;background:var(--accent)"></div>
    <div class="lbl">accent</div>
    <div class="val">#A94DCC</div>
  </div>
  <div class="col">
    <div class="swatch" style="width:100px;height:64px;background:var(--accent-hover)"></div>
    <div class="lbl">accent-hover</div>
    <div class="val">#BC63DC</div>
  </div>
  <div class="col">
    <div class="swatch" style="width:100px;height:64px;background:var(--accent-soft)"></div>
    <div class="lbl">accent-soft</div>
    <div class="val">13% tint</div>
  </div>
  <div class="col">
    <div class="swatch" style="width:160px;height:64px;background:radial-gradient(circle at 30% 50%,var(--accent-glow),transparent 65%),radial-gradient(circle at 80% 60%,var(--coral-glow),transparent 65%),var(--bg-2)"></div>
    <div class="lbl">bloom glow</div>
    <div class="val">purple + coral</div>
  </div>
</div></body></html>
