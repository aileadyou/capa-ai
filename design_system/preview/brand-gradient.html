<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:6px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
.swatch{border-radius:10px;border:1px solid var(--line-2)}

</style></head><body>
<div class="col" style="gap:14px">
  <div style="width:100%;height:100px;border-radius:14px;background:var(--grad-brand)"></div>
  <div class="row" style="gap:16px">
    <div class="col"><div class="swatch" style="width:60px;height:40px;background:#9B3AC5"></div><div class="lbl">#9B3AC5</div></div>
    <div class="col"><div class="swatch" style="width:60px;height:40px;background:#C4688C"></div><div class="lbl">#C4688C</div></div>
    <div class="col"><div class="swatch" style="width:60px;height:40px;background:#E07D60"></div><div class="lbl">#E07D60</div></div>
    <div class="col" style="margin-left:auto;max-width:200px"><div class="lbl" style="color:var(--fg-2)">Purple → magenta → coral. Matches real Lead.AI logo mark.</div></div>
  </div>
</div></body></html>
