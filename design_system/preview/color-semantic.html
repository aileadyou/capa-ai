<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;
  -webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.swatch{border-radius:var(--r-sm);border:1px solid var(--line-2)}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}

</style></head><body><div class="row">
<div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#3FB984"></div><div class="lbl">success</div><div class="val">#3FB984</div></div><div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#E0A33E"></div><div class="lbl">warning</div><div class="val">#E0A33E</div></div><div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#E5575C"></div><div class="lbl">danger</div><div class="val">#E5575C</div></div><div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#4D86F7"></div><div class="lbl">info</div><div class="val">#4D86F7</div></div>
</div></body></html>
