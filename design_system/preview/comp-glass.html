<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.media{position:relative;overflow:hidden;border-radius:var(--r-lg);border:1px solid var(--line-2);background-size:cover;background-position:center}
.glass{background:var(--glass-light);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border:1px solid var(--glass-border);border-radius:var(--r-md);box-shadow:var(--shadow-md),inset 0 1px 0 0 var(--glass-border-top)}
.glass-dark{background:var(--glass-dark);backdrop-filter:blur(var(--glass-blur)) saturate(1.1);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.1);border:1px solid var(--glass-border);border-radius:var(--r-md);box-shadow:inset 0 1px 0 0 var(--glass-border-top)}

</style></head><body>
<div style="display:flex;gap:16px">
  <div class="media" style="width:320px;height:180px;background-image:url('../assets/media/abstract-1.png')">
    <div class="glass" style="position:absolute;left:16px;right:16px;bottom:16px;padding:14px 16px">
      <div class="lbl" style="color:var(--fg-3);margin-bottom:6px">FROSTED · over dark media</div>
      <div style="font-weight:600;font-size:16px">See every token, in real time.</div>
    </div>
  </div>
  <div class="media" style="width:320px;height:180px;background-image:url('../assets/media/abstract-2.png')">
    <div class="glass-dark" style="position:absolute;left:16px;right:16px;bottom:16px;padding:14px 16px">
      <div class="lbl" style="color:var(--fg-3);margin-bottom:6px">SMOKED · over bright media</div>
      <div style="font-weight:600;font-size:16px">Maximum text legibility.</div>
    </div>
  </div>
</div></body></html>
