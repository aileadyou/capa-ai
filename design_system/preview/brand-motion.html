<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:12px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.btn{font-family:var(--font-sans);font-weight:600;font-size:14px;border-radius:var(--r-md);padding:11px 18px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all var(--dur-fast) var(--ease-out)}
.btn-primary{background:var(--accent);color:var(--on-accent)}
.btn-secondary{background:var(--bg-3);color:var(--fg-1);border-color:var(--line-2)}
.btn-ghost{background:transparent;color:var(--fg-2)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:var(--r-sm)}

.track{width:100%;height:8px;background:var(--bg-3);border-radius:4px;position:relative;overflow:hidden}
.fill{position:absolute;inset:0;width:0;background:var(--accent);animation:run 2.4s var(--ease-out) infinite}
@keyframes run{0%{width:0;opacity:.4}60%{width:100%;opacity:1}100%{width:100%;opacity:1}}

</style></head><body><div class="col" style="gap:14px">
<div class="track"><div class="fill"></div></div>
<div class="lbl">SLOW · CONFIDENT · SMOOTH — opacity + translateY, 500–900ms, cubic-bezier(.22,1,.36,1). No bounce.</div>
</div></body></html>
