<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;-webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:12px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.btn{font-family:var(--font-sans);font-weight:600;font-size:14px;border-radius:var(--r-md);padding:11px 18px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all var(--dur-fast) var(--ease-out)}
.btn-primary{background:var(--accent);color:var(--on-accent)}
.btn-secondary{background:var(--bg-3);color:var(--fg-1);border-color:var(--line-2)}
.btn-ghost{background:transparent;color:var(--fg-2)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:var(--r-sm)}

.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:.04em;padding:4px 10px;border-radius:var(--r-full);border:1px solid}
.dot{width:6px;height:6px;border-radius:50%}

</style></head><body><div class="row">
<span class="badge" style="color:var(--success);border-color:var(--success-soft);background:var(--success-soft)"><span class="dot" style="background:var(--success)"></span>HEALTHY</span>
<span class="badge" style="color:var(--warning);border-color:var(--warning-soft);background:var(--warning-soft)"><span class="dot" style="background:var(--warning)"></span>DEGRADED</span>
<span class="badge" style="color:var(--danger);border-color:var(--danger-soft);background:var(--danger-soft)"><span class="dot" style="background:var(--danger)"></span>OFFLINE</span>
<span class="badge" style="color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)">v2.4.1</span>
</div></body></html>
