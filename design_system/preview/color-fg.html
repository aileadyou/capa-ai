<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{margin:0;box-sizing:border-box}
body{background:var(--bg-1);color:var(--fg-1);font-family:var(--font-sans);padding:24px;
  -webkit-font-smoothing:antialiased;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.swatch{border-radius:var(--r-sm);border:1px solid var(--line-2)}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.04em}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}

</style></head><body><div class="row" style="background:var(--bg-1)">
<div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#F3F5F7"></div><div class="lbl">fg-1</div><div class="val">#F3F5F7</div></div><div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#A2A9B4"></div><div class="lbl">fg-2</div><div class="val">#A2A9B4</div></div><div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#6A7280"></div><div class="lbl">fg-3</div><div class="val">#6A7280</div></div><div class="col" style="gap:6px"><div class="swatch" style="width:120px;height:64px;background:#444B56"></div><div class="lbl">fg-4</div><div class="val">#444B56</div></div>
</div></body></html>
